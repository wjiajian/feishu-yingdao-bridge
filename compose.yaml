services:
  feishu-shadowbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: feishu-shadowbot
    env_file:
      - .env
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:' + (process.env.PORT || 3000) + '/healthz').then((response) => { if (!response.ok) { process.exit(1); } }).catch(() => process.exit(1));"
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
